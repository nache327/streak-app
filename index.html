<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streak — Daily Discipline Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ── VARIABLES & RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   #222;
      --muted:    #444;
      --text:     #f0f0f0;
      --sub:      #888;
      --accent:   #e8f55a;
      --success:  #4dff91;
      --fail:     #ff4d4d;
      --warn:     #ffb347;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ONBOARDING ── */
    #screen-onboard {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      gap: 2rem;
    }

    .onboard-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 10vw, 5rem);
      color: var(--accent);
      text-align: center;
      line-height: 1;
    }

    .onboard-sub {
      color: var(--sub);
      text-align: center;
      font-size: 1rem;
      max-width: 320px;
      line-height: 1.6;
    }

    .onboard-form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .onboard-form label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .onboard-form input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      padding: 0.9rem 1.1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .onboard-form input:focus { border-color: var(--accent); }
    .onboard-form input::placeholder { color: var(--muted); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #0a0a0a;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      padding: 1rem;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.4rem 0;
    }

    .topbar-wordmark {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .topbar-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--sub);
    }

    /* goal subtitle row */
    #goal-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 1.4rem 0;
    }

    #topbar-goal {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70vw;
    }

    .goal-edit-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .goal-edit-btn:hover { color: var(--accent); }

    #goal-inline-input {
      display: none;
      background: none;
      border: none;
      border-bottom: 1px solid var(--accent);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      outline: none;
      padding: 0 0 2px;
      width: 160px;
    }

    .goal-save-btn {
      display: none;
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0;
      flex-shrink: 0;
    }

    /* ── NAVIGATION ── */
    #nav {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 1.4rem 0;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--sub);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.45rem 0.9rem;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .nav-btn:hover { border-color: var(--muted); color: var(--text); }

    .nav-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0a;
    }

    /* ── SCREENS ── */
    .screen { display: none; padding: 1.4rem; max-width: 480px; margin: 0 auto; }
    .screen.active { display: block; }

    /* ── DASHBOARD ── */
    .streak-display {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }

    .streak-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 0.4rem;
    }

    .streak-number {
      font-family: 'Syne', sans-serif;
      font-size: clamp(5rem, 22vw, 9rem);
      line-height: 0.9;
      color: var(--accent);
    }

    .streak-unit {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      color: var(--sub);
      margin-top: 0.3rem;
    }

    .streak-target {
      margin-top: 0.6rem;
      font-size: 0.82rem;
      color: var(--sub);
    }

    .streak-target span { color: var(--text); font-weight: 500; }

    /* mini stats row */
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }

    .mini-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 0.5rem;
      text-align: center;
    }

    .mini-stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      color: var(--text);
    }

    .mini-stat-lbl {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
      margin-top: 0.2rem;
    }

    /* 7-day strip */
    .week-strip {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.4rem;
      justify-content: center;
    }

    .week-day {
      flex: 1;
      max-width: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .week-day-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .week-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .week-dot.yes { background: var(--success); border-color: var(--success); }
    .week-dot.no  { background: var(--fail);    border-color: var(--fail); }
    .week-dot.today { border-color: var(--accent); border-width: 2px; }

    /* check-in buttons */
    .checkin-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .btn-yes, .btn-no {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      padding: 1.4rem 1rem;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-yes { background: var(--success); color: #0a0a0a; }
    .btn-no  { background: var(--fail);    color: #fff; }
    .btn-yes:hover, .btn-no:hover { opacity: 0.85; }
    .btn-yes:active, .btn-no:active { transform: scale(0.97); }

    .checkin-done {
      text-align: center;
      padding: 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 0.9rem;
      color: var(--sub);
      display: none;
    }

    .checkin-done .done-result {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }

    .done-result.yes { color: var(--success); }
    .done-result.no  { color: var(--fail); }

    /* ── CALENDAR ── */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .cal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
    }

    .cal-nav {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.35rem 0.75rem;
      transition: border-color 0.15s;
    }

    .cal-nav:hover { border-color: var(--muted); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.3rem;
    }

    .cal-dow {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
      text-align: center;
      padding: 0.3rem 0;
    }

    .cal-cell {
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      color: var(--sub);
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .cal-cell:hover { border-color: var(--muted); }
    .cal-cell.empty { background: none; border-color: transparent; cursor: default; }
    .cal-cell.yes { background: var(--success); border-color: var(--success); color: #0a0a0a; font-weight: 700; }
    .cal-cell.no  { background: var(--fail);    border-color: var(--fail);    color: #fff;    font-weight: 700; }
    .cal-cell.today { border-color: var(--accent); border-width: 2px; }
    .cal-cell.future { opacity: 0.2; cursor: default; }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      margin-bottom: 1.2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem;
    }

    .stat-card.full { grid-column: 1 / -1; }

    .stat-card-val {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      color: var(--text);
    }

    .stat-card-val.accent { color: var(--accent); }
    .stat-card-val.success { color: var(--success); }
    .stat-card-val.fail   { color: var(--fail); }

    .stat-card-lbl {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
      margin-top: 0.25rem;
    }

    /* 30-day chart */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem;
      margin-bottom: 1.2rem;
    }

    .chart-title {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 0.8rem;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 60px;
    }

    .chart-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      min-height: 4px;
    }

    .chart-bar.yes { background: var(--success); }
    .chart-bar.no  { background: var(--fail); }
    .chart-bar.empty { background: var(--border); }

    /* ── SETTINGS ── */
    .settings-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem;
      margin-bottom: 0.8rem;
    }

    .settings-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 0.7rem;
    }

    .settings-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.7rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0.6rem;
    }

    .settings-input:focus { border-color: var(--accent); }

    .btn-outline {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.65rem 1rem;
      transition: border-color 0.15s, color 0.15s;
      width: 100%;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      border-color: var(--fail);
      color: var(--fail);
    }

    .btn-danger:hover { background: var(--fail) !important; color: #fff !important; }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
    }

    .modal-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--sub);
      margin-bottom: 1rem;
    }

    .modal-result-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .modal-result-btn {
      border: 2px solid var(--border);
      border-radius: 10px;
      background: none;
      color: var(--sub);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      padding: 0.75rem;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .modal-result-btn.yes.active { background: var(--success); border-color: var(--success); color: #0a0a0a; }
    .modal-result-btn.no.active  { background: var(--fail);    border-color: var(--fail);    color: #fff; }
    .modal-result-btn:not(.active):hover { border-color: var(--muted); color: var(--text); }

    .modal-note {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 0.8rem 1rem;
      width: 100%;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
      min-height: 80px;
    }

    .modal-note:focus { border-color: var(--accent); }
    .modal-note::placeholder { color: var(--muted); }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      border-radius: 40px;
      padding: 0.65rem 1.3rem;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 200;
      transition: transform 0.3s ease, opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── MILESTONE BANNER ── */
    #milestone-banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      z-index: 150;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }

    #milestone-banner.open { display: flex; }

    .milestone-emoji { font-size: 4rem; }

    .milestone-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      color: var(--accent);
    }

    .milestone-sub { color: var(--sub); font-size: 1rem; }

    .milestone-close {
      margin-top: 0.5rem;
      background: var(--accent);
      border: none;
      border-radius: 40px;
      color: #0a0a0a;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      padding: 0.7rem 2rem;
      text-transform: uppercase;
    }

    /* ── CONFETTI ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 140;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
      color: var(--sub);
      text-transform: uppercase;
    }

    /* ── UTILITY ── */
    .hidden { display: none !important; }
    .text-center { text-align: center; }
  </style>
</head>
<body>

<!-- ONBOARDING -->
<div id="screen-onboard">
  <div class="onboard-title">STREAK</div>
  <div class="onboard-sub">Pick one discipline. Track it daily.<br>Watch the streak grow.</div>
  <div class="onboard-form">
    <label for="goal-input">What's your daily goal?</label>
    <input id="goal-input" type="text" placeholder="e.g. No junk food" maxlength="60" />
    <button class="btn-primary" onclick="startApp()">Start Tracking</button>
  </div>
</div>

<!-- MAIN APP (hidden until goal set) -->
<div id="app" class="hidden">
  <!-- Top bar -->
  <div id="topbar">
    <div class="topbar-wordmark">STREAK</div>
    <div class="topbar-date" id="topbar-date">—</div>
  </div>
  <div id="goal-row">
    <span id="topbar-goal">—</span>
    <button class="goal-edit-btn" onclick="startGoalEdit()" title="Rename goal">✎</button>
    <input id="goal-inline-input" type="text" maxlength="60" onkeydown="handleGoalKey(event)" />
    <button class="goal-save-btn" id="goal-save-btn" onclick="saveGoalInline()">✓</button>
  </div>

  <!-- Nav -->
  <div id="nav">
    <button class="nav-btn active" data-screen="dashboard">Today</button>
    <button class="nav-btn"        data-screen="calendar">History</button>
    <button class="nav-btn"        data-screen="stats">Stats</button>
    <button class="nav-btn"        data-screen="settings">Settings</button>
  </div>

  <!-- DASHBOARD -->
  <div id="screen-dashboard" class="screen active">
    <div class="streak-display">
      <div class="streak-label">Current Streak</div>
      <div class="streak-number" id="dash-streak">0</div>
      <div class="streak-unit">days</div>
      <div class="streak-target" id="dash-target"></div>
    </div>

    <div class="mini-stats">
      <div class="mini-stat">
        <div class="mini-stat-val" id="dash-best">0</div>
        <div class="mini-stat-lbl">Best</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-val" id="dash-wins">0</div>
        <div class="mini-stat-lbl">Wins</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-val" id="dash-rate">—</div>
        <div class="mini-stat-lbl">Rate</div>
      </div>
    </div>

    <div class="week-strip" id="week-strip"></div>

    <!-- Check-in -->
    <div class="checkin-area" id="checkin-area">
      <button class="btn-yes" onclick="logDay('yes')">✓ Yes</button>
      <button class="btn-no"  onclick="logDay('no')">✗ No</button>
    </div>

    <div class="checkin-done" id="checkin-done">
      <div class="done-result" id="done-result-label">—</div>
      <div id="done-note-display"></div>
      <button class="btn-outline" style="margin-top:0.8rem;width:auto;padding:0.5rem 1.2rem;" onclick="openModal(todayStr())">Edit today</button>
    </div>
  </div>

  <!-- CALENDAR -->
  <div id="screen-calendar" class="screen">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">‹</button>
      <div class="cal-title" id="cal-title">—</div>
      <button class="cal-nav" id="cal-next">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- STATS -->
  <div id="screen-stats" class="screen">
    <div class="chart-wrap">
      <div class="chart-title">30-Day Trend</div>
      <div class="chart-bars" id="chart-bars"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-val accent" id="stat-streak">0</div>
        <div class="stat-card-lbl">Current Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val" id="stat-best">0</div>
        <div class="stat-card-lbl">Personal Best</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val success" id="stat-wins">0</div>
        <div class="stat-card-lbl">Total Wins</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val fail" id="stat-fails">0</div>
        <div class="stat-card-lbl">Total Fails</div>
      </div>
      <div class="stat-card full">
        <div class="stat-card-val accent" id="stat-rate">—</div>
        <div class="stat-card-lbl">Success Rate</div>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="screen-settings" class="screen">
    <div class="settings-section">
      <div class="settings-label">Rename Goal</div>
      <input class="settings-input" id="rename-input" type="text" />
      <button class="btn-outline" onclick="renameGoal()">Save Name</button>
    </div>

    <div class="settings-section">
      <div class="settings-label">Data</div>
      <button class="btn-outline" onclick="exportData()">Export JSON Backup</button>
      <button class="btn-outline" onclick="document.getElementById('import-file').click()">Import JSON Backup</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)" />
    </div>

    <div class="settings-section">
      <div class="settings-label">Danger Zone</div>
      <button class="btn-outline btn-danger" onclick="resetApp()">Reset All Data</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-title">Edit Day</div>
    <div class="modal-date" id="modal-date-label">—</div>
    <div class="modal-result-row">
      <button class="modal-result-btn yes" id="modal-btn-yes" onclick="selectModalResult('yes')">✓ Yes</button>
      <button class="modal-result-btn no"  id="modal-btn-no"  onclick="selectModalResult('no')">✗ No</button>
    </div>
    <textarea class="modal-note" id="modal-note" placeholder="Optional reflection…" rows="3"></textarea>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveModal()" style="border-radius:8px">Save</button>
    </div>
  </div>
</div>

<!-- MILESTONE BANNER -->
<div id="milestone-banner">
  <div class="milestone-emoji" id="milestone-emoji">🔥</div>
  <div class="milestone-title" id="milestone-title">—</div>
  <div class="milestone-sub" id="milestone-sub">—</div>
  <button class="milestone-close" onclick="closeMilestone()">Keep Going</button>
</div>

<!-- CONFETTI -->
<canvas id="confetti-canvas"></canvas>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONSTANTS ──
const MILESTONES = [3, 7, 14, 21, 30, 50, 100];
const MILESTONE_MSGS = {
  3:   { emoji: '🌱', title: '3-Day Streak!',   sub: 'The habit is forming.' },
  7:   { emoji: '🔥', title: '1 Week!',          sub: 'One full week — respect.' },
  14:  { emoji: '💪', title: '2 Weeks!',         sub: 'You\'re building something real.' },
  21:  { emoji: '⚡', title: '21 Days!',         sub: 'They say habits form at 21.' },
  30:  { emoji: '🏆', title: '30-Day Streak!',   sub: 'A full month. Incredible.' },
  50:  { emoji: '💎', title: '50 Days!',         sub: 'You\'re in the top 1%.' },
  100: { emoji: '🚀', title: '100 Days!!!',      sub: 'Absolute discipline. Legend.' },
};

const STORAGE_KEY = 'streak_app_v1';

// ── DATA LAYER ──
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; } catch { return null; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function createFreshState(goal) {
  return {
    version: 1,
    goal,
    startDate: todayStr(),
    entries: {},
    reminderTime: null,
    createdAt: new Date().toISOString(),
  };
}

// ── DATE UTILS ──
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatMonthYear(date) {
  return date.toLocaleString('default', { month: 'long', year: 'numeric' });
}

function formatDisplayDate(str) {
  return parseDate(str).toLocaleDateString('default', { weekday: 'long', month: 'long', day: 'numeric' });
}

function dayOfWeek(str) {
  return parseDate(str).toLocaleDateString('default', { weekday: 'short' }).slice(0, 2);
}

function addDays(str, n) {
  const d = parseDate(str);
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

// ── STATS ENGINE ──
function computeStats(data) {
  const today = todayStr();
  const entries = data.entries;
  const days = Object.keys(entries).sort();
  let wins = 0, fails = 0, currentStreak = 0, best = 0, run = 0;

  // current streak: walk back from today
  let cursor = today;
  while (entries[cursor]) {
    if (entries[cursor].result === 'yes') { currentStreak++; cursor = addDays(cursor, -1); }
    else break;
  }

  // personal best
  let prevResult = null;
  for (const d of days) {
    if (entries[d].result === 'yes') {
      run++;
      best = Math.max(best, run);
    } else { run = 0; }
    if (entries[d].result === 'yes') wins++;
    else fails++;
  }

  const total = wins + fails;
  const rate = total ? Math.round((wins / total) * 100) + '%' : '—';
  return { currentStreak, best, wins, fails, rate };
}

// ── APP STATE ──
let appData = null;
let calViewDate = new Date();
let modalDate = null;
let modalResult = null;

// ── ROUTER ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelector(`.nav-btn[data-screen="${name}"]`).classList.add('active');

  if (name === 'calendar') renderCalendar();
  if (name === 'stats') renderStats();
  if (name === 'settings') {
    document.getElementById('rename-input').value = appData.goal;
  }
}

// ── RENDERERS ──
function renderDashboard() {
  const s = computeStats(appData);
  const today = todayStr();
  document.getElementById('topbar-goal').textContent = appData.goal;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('default', { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('dash-streak').textContent = s.currentStreak;
  document.getElementById('dash-best').textContent = s.best;
  document.getElementById('dash-wins').textContent = s.wins;
  document.getElementById('dash-rate').textContent = s.rate;

  const toGo = s.best > s.currentStreak ? s.best - s.currentStreak : 1;
  if (s.best === 0 || s.currentStreak === 0) {
    document.getElementById('dash-target').innerHTML = 'Start your streak today';
  } else if (s.currentStreak >= s.best) {
    document.getElementById('dash-target').innerHTML = '<span>Personal best!</span> Keep going';
  } else {
    document.getElementById('dash-target').innerHTML = `<span>${toGo}</span> day${toGo !== 1 ? 's' : ''} to beat your best`;
  }

  // 7-day strip
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  for (let i = 6; i >= 0; i--) {
    const d = addDays(today, -i);
    const e = appData.entries[d];
    const el = document.createElement('div');
    el.className = 'week-day';
    const dot = document.createElement('div');
    dot.className = 'week-dot' + (e ? ' ' + e.result : '') + (d === today ? ' today' : '');
    const lbl = document.createElement('div');
    lbl.className = 'week-day-label';
    lbl.textContent = dayOfWeek(d);
    el.appendChild(dot);
    el.appendChild(lbl);
    strip.appendChild(el);
  }

  // Check-in state
  const todayEntry = appData.entries[today];
  if (todayEntry) {
    document.getElementById('checkin-area').style.display = 'none';
    document.getElementById('checkin-done').style.display = 'block';
    const lbl = document.getElementById('done-result-label');
    lbl.textContent = todayEntry.result === 'yes' ? '✓ YES — kept it' : '✗ No — missed today';
    lbl.className = 'done-result ' + todayEntry.result;
    document.getElementById('done-note-display').textContent = todayEntry.note || '';
  } else {
    document.getElementById('checkin-area').style.display = 'grid';
    document.getElementById('checkin-done').style.display = 'none';
  }
}

function renderCalendar() {
  const year = calViewDate.getFullYear();
  const month = calViewDate.getMonth();
  document.getElementById('cal-title').textContent = calViewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
  const today = todayStr();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(year, month, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const str = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e = appData.entries[str];
    const el = document.createElement('div');
    let cls = 'cal-cell';
    if (str > today) cls += ' future';
    else if (e) cls += ' ' + e.result;
    if (str === today) cls += ' today';
    el.className = cls;
    el.textContent = d;
    if (str <= today) el.onclick = () => openModal(str);
    grid.appendChild(el);
  }
}

function renderStats() {
  const s = computeStats(appData);
  document.getElementById('stat-streak').textContent = s.currentStreak;
  document.getElementById('stat-best').textContent = s.best;
  document.getElementById('stat-wins').textContent = s.wins;
  document.getElementById('stat-fails').textContent = s.fails;
  document.getElementById('stat-rate').textContent = s.rate;

  // 30-day bar chart
  const bars = document.getElementById('chart-bars');
  bars.innerHTML = '';
  const today = todayStr();
  for (let i = 29; i >= 0; i--) {
    const d = addDays(today, -i);
    const e = appData.entries[d];
    const bar = document.createElement('div');
    bar.className = 'chart-bar ' + (e ? e.result : 'empty');
    bar.style.height = e ? '100%' : '20%';
    bars.appendChild(bar);
  }
}

// ── CHECK-IN ──
function logDay(result) {
  const today = todayStr();
  if (appData.entries[today]) return;
  appData.entries[today] = {
    result,
    note: '',
    loggedAt: new Date().toISOString(),
  };
  saveData(appData);
  renderDashboard();
  showToast(result === 'yes' ? '✓ Logged — great work!' : 'Logged. Tomorrow is a new day.');

  if (result === 'yes') {
    const s = computeStats(appData);
    const isNewBest = s.currentStreak > 0 && s.currentStreak === s.best && s.currentStreak > 1;
    if (isNewBest) launchConfetti();
    if (MILESTONES.includes(s.currentStreak)) showMilestoneBanner(s.currentStreak);
  }
}

// ── MODAL ──
function openModal(dateStr) {
  modalDate = dateStr;
  const e = appData.entries[dateStr];
  modalResult = e ? e.result : null;
  document.getElementById('modal-date-label').textContent = formatDisplayDate(dateStr);
  document.getElementById('modal-note').value = e ? (e.note || '') : '';
  updateModalResultBtns();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalDate = null;
  modalResult = null;
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function selectModalResult(result) {
  modalResult = result;
  updateModalResultBtns();
}

function updateModalResultBtns() {
  document.getElementById('modal-btn-yes').className = 'modal-result-btn yes' + (modalResult === 'yes' ? ' active' : '');
  document.getElementById('modal-btn-no').className  = 'modal-result-btn no'  + (modalResult === 'no'  ? ' active' : '');
}

function saveModal() {
  if (!modalResult) { showToast('Pick Yes or No first'); return; }
  const note = document.getElementById('modal-note').value.trim();
  const existing = appData.entries[modalDate];
  appData.entries[modalDate] = {
    result: modalResult,
    note,
    loggedAt: existing ? existing.loggedAt : new Date().toISOString(),
  };
  saveData(appData);
  closeModal();
  renderDashboard();
  if (document.getElementById('screen-calendar').classList.contains('active')) renderCalendar();
  showToast('Saved');
}

// ── CELEBRATIONS ──
function showMilestoneBanner(n) {
  const m = MILESTONE_MSGS[n];
  if (!m) return;
  document.getElementById('milestone-emoji').textContent = m.emoji;
  document.getElementById('milestone-title').textContent = m.title;
  document.getElementById('milestone-sub').textContent = m.sub;
  document.getElementById('milestone-banner').classList.add('open');
  launchConfetti();
}

function closeMilestone() {
  document.getElementById('milestone-banner').classList.remove('open');
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    vx: (Math.random() - 0.5) * 4,
    vy: Math.random() * 3 + 2,
    color: ['#e8f55a','#4dff91','#ff4d4d','#fff','#ffb347'][Math.floor(Math.random()*5)],
    size: Math.random() * 8 + 4,
    rot: Math.random() * 360,
    rspeed: (Math.random() - 0.5) * 8,
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.rspeed; p.vy += 0.05;
    });
    frame++;
    if (frame < 150) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SETTINGS ──
function renameGoal() {
  const v = document.getElementById('rename-input').value.trim();
  if (!v) return;
  appData.goal = v;
  saveData(appData);
  document.getElementById('topbar-goal').textContent = v;
  showToast('Goal renamed');
}

function startGoalEdit() {
  const input = document.getElementById('goal-inline-input');
  const btn = document.getElementById('goal-save-btn');
  input.value = appData.goal;
  document.getElementById('topbar-goal').style.display = 'none';
  document.querySelector('.goal-edit-btn').style.display = 'none';
  input.style.display = 'inline-block';
  btn.style.display = 'inline-block';
  input.focus();
  input.select();
}

function saveGoalInline() {
  const input = document.getElementById('goal-inline-input');
  const v = input.value.trim();
  if (v) {
    appData.goal = v;
    saveData(appData);
    document.getElementById('rename-input').value = v;
    showToast('Goal renamed');
  }
  document.getElementById('topbar-goal').textContent = appData.goal;
  document.getElementById('topbar-goal').style.display = '';
  document.querySelector('.goal-edit-btn').style.display = '';
  input.style.display = 'none';
  document.getElementById('goal-save-btn').style.display = 'none';
}

function handleGoalKey(e) {
  if (e.key === 'Enter') saveGoalInline();
  if (e.key === 'Escape') {
    document.getElementById('goal-inline-input').value = appData.goal;
    saveGoalInline();
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'streak-backup.json';
  a.click();
  showToast('Backup exported');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.goal || !d.entries) throw new Error('Invalid format');
      saveData(d);
      appData = d;
      renderDashboard();
      showToast('Data imported!');
    } catch { showToast('Invalid backup file'); }
  };
  reader.readAsText(file);
}

function resetApp() {
  if (!confirm('This will delete all your data. Are you sure?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ── EVENT BINDING ──
function bindEvents() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => showScreen(btn.dataset.screen));
  });
  document.getElementById('cal-prev').addEventListener('click', () => {
    calViewDate.setMonth(calViewDate.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calViewDate.setMonth(calViewDate.getMonth() + 1);
    renderCalendar();
  });
}

// ── BOOT + INIT ──
function startApp() {
  const goal = document.getElementById('goal-input').value.trim();
  if (!goal) { document.getElementById('goal-input').focus(); return; }
  appData = createFreshState(goal);
  saveData(appData);
  bootApp();
}

function bootApp() {
  document.getElementById('screen-onboard').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  bindEvents();
  renderDashboard();
}

// INIT
(function init() {
  const data = loadData();
  if (data) {
    appData = data;
    bootApp();
  }
  // Allow Enter key on goal input
  document.getElementById('goal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startApp();
  });
})();
</script>
</body>
</html>
